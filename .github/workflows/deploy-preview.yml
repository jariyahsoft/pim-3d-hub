name: Deploy Preview

on:
  pull_request:
  workflow_dispatch:
    inputs:
      environment:
        description: preview or staging
        required: true
        default: staging
      dry_run:
        description: set false only when staging credentials are configured
        required: true
        default: 'true'
      smoke_base_url:
        description: optional deployed base URL for live health/readiness smoke checks
        required: false
        default: ''

jobs:
  validate-target:
    runs-on: ubuntu-latest
    env:
      DEPLOY_DRY_RUN: ${{ github.event_name == 'pull_request' && 'true' || github.event.inputs.dry_run || 'true' }}
      DEPLOY_ENVIRONMENT: ${{ github.event_name == 'pull_request' && 'preview' || github.event.inputs.environment || 'preview' }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: pnpm
      - run: corepack enable
      - run: corepack pnpm install --frozen-lockfile
      - run: node tools/validate-deploy-target.mjs

  package-foundation:
    runs-on: ubuntu-latest
    needs: validate-target
    env:
      DEPLOY_DRY_RUN: ${{ github.event_name == 'pull_request' && 'true' || github.event.inputs.dry_run || 'true' }}
      DEPLOY_ENVIRONMENT: ${{ github.event_name == 'pull_request' && 'preview' || github.event.inputs.environment || 'preview' }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: pnpm
      - run: corepack enable
      - run: corepack pnpm install --frozen-lockfile
      - run: corepack pnpm lint
      - run: corepack pnpm typecheck
      - run: corepack pnpm build
      - run: corepack pnpm test:rules
      - run: corepack pnpm firestore:indexes:check
      - run: corepack pnpm smoke:health
      - uses: actions/upload-artifact@v4
        with:
          name: foundation-preview-${{ env.DEPLOY_ENVIRONMENT }}
          path: |
            apps
            services
            firebase
            infra

  deploy-firebase-config:
    runs-on: ubuntu-latest
    needs: package-foundation
    if: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.dry_run == 'false' }}
    env:
      FIREBASE_PROJECT_ID: ${{ secrets.FIREBASE_PROJECT_ID_STAGING }}
      GOOGLE_APPLICATION_CREDENTIALS_JSON: ${{ secrets.FIREBASE_DEPLOY_SERVICE_ACCOUNT_STAGING }}
      SMOKE_BASE_URL: ${{ github.event.inputs.smoke_base_url }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: pnpm
      - run: corepack enable
      - run: corepack pnpm install --frozen-lockfile
      - run: test -n "$FIREBASE_PROJECT_ID"
      - run: test -n "$GOOGLE_APPLICATION_CREDENTIALS_JSON"
      - run: printf '%s' "$GOOGLE_APPLICATION_CREDENTIALS_JSON" > "$RUNNER_TEMP/firebase-deploy.json"
      - run: export GOOGLE_APPLICATION_CREDENTIALS="$RUNNER_TEMP/firebase-deploy.json" && corepack pnpm exec firebase deploy --project "$FIREBASE_PROJECT_ID" --only firestore:rules,firestore:indexes,storage --config firebase/firebase.json --non-interactive
      - run: node tools/health-smoke-check.mjs --base-url="$SMOKE_BASE_URL"
